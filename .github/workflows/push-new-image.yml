name: push-new-image

on:
  workflow_dispatch:
    inputs:
      version:
        required: true

jobs:
  push-new-image:
    runs-on: ubuntu-latest
    steps:
      - name: Extract short version
        run: |
          version_short=$(echo ${{ inputs.version }} | awk -F "." '{print $1 "." $2 "." $3}')
          echo "version_short=$version_short" >> $GITHUB_ENV
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # 4.0.0
        with:
          platforms: linux/amd64,linux/arm64
      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # 4.0.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_WRITE_PAT }}
      - name: Build and Push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # 7.0.0
        with:
          context: "{{defaultContext}}:${{ env.version_short }}"
          push: true
          tags: newrelic/php-daemon:latest,newrelic/php-daemon:${{ env.version_short }} 
          platforms: linux/amd64,linux/arm64
