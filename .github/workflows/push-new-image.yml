name: push-new-image
permissions: {}

on:
  workflow_dispatch:
    inputs:
      version:
        required: true

jobs:
  push-new-image:
    runs-on: ubuntu-latest
    steps:
      - name: Extract short version
        run: |
          version_short=$(echo ${{ inputs.version }} | awk -F "." '{print $1 "." $2 "." $3}')
          echo "version_short=$version_short" >> $GITHUB_ENV
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # 4.0.0
        with:
          platforms: linux/amd64,linux/arm64
      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # 4.1.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_WRITE_PAT }}
      - name: Build and Push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # 7.1.0
        with:
          context: "{{defaultContext}}:${{ env.version_short }}"
          push: true
          tags: newrelic/php-daemon:latest,newrelic/php-daemon:${{ env.version_short }} 
          platforms: linux/amd64,linux/arm64
