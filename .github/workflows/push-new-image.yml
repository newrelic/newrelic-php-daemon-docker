name: push-new-image
permissions: {}

on:
  workflow_dispatch:
    inputs:
      version:
        required: true

jobs:
  push-new-image:
    runs-on: ubuntu-latest
    steps:
      - name: Extract short version
        run: |
          version_short=$(echo ${{ inputs.version }} | awk -F "." '{print $1 "." $2 "." $3}')
          echo "version_short=$version_short" >> $GITHUB_ENV
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # 4.1.0
        with:
          platforms: linux/amd64,linux/arm64
      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # 4.2.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_WRITE_PAT }}
      - name: Build and Push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # 7.3.0
        with:
          context: "{{defaultContext}}:${{ env.version_short }}"
          push: true
          tags: newrelic/php-daemon:latest,newrelic/php-daemon:${{ env.version_short }} 
          platforms: linux/amd64,linux/arm64
